<!DOCTYPE html>
<html>
<head>
    <title>RGBA Color Example</title>
</head>
<body>

    <h1 style="background-color: rgba(255, 0, 0, 0.5);">
        Red Background with 50% Transparency
    </h1>

    <h2 style="background-color: rgba(0, 0, 255, 0.7);">
        Blue Background with 70% Transparency
    </h2>

    <p style="background-color: rgba(0, 255, 0, 0.3);">
        This paragraph uses green with transparency effect.
    </p>

</body>
</html>
