<!DOCTYPE html>
<html>
<head>
    <title>HSL Color Example</title>
</head>
<body style="background-color: hsl(0, 0%, 95%);">

    <h1 style="color: hsl(0, 100%, 50%);">
        Red Heading
    </h1>

    <h2 style="color: hsl(240, 100%, 50%);">
        Blue Heading
    </h2>

    <p style="color: hsl(120, 100%, 25%);">
        This paragraph uses green HSL color.
    </p>

    <p style="color: hsl(30, 100%, 50%);">
        This text uses orange HSL color.
    </p>

</body>
</html>
