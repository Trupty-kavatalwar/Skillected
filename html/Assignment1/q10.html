<!DOCTYPE html>
<html>
<head>
    <title>Formatting Tags Example</title>
</head>
<body>

    <h1>HTML Formatting Tags</h1>

    <p>
        <mark>This text is highlighted using mark tag.</mark>
    </p>

    <p>
        <small>This text is smaller using small tag.</small>
    </p>

    <p>
        <del>This text is deleted using del tag.</del>
    </p>

    <p>
        <ins>This text is inserted using ins tag.</ins>
    </p>

</body>
</html>
