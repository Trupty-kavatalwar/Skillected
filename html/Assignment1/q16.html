<!DOCTYPE html>
<html>
<head>
    <title>RGB Color Example</title>
</head>
<body style="background-color: rgb(240, 240, 240);">

    <h1 style="color: rgb(255, 0, 0);">
        Red Heading
    </h1>

    <h2 style="color: rgb(0, 0, 255);">
        Blue Heading
    </h2>

    <p style="color: rgb(0, 128, 0);">
        This paragraph uses green RGB color.
    </p>

    <p style="color: rgb(255, 165, 0);">
        This text uses orange RGB color.
    </p>

</body>
</html>
