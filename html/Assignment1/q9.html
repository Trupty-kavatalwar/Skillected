<!DOCTYPE html>
<html>
<head>
    <title>Formatting Tags Example</title>
</head>
<body>

    <h1>HTML Formatting Tags</h1>

    <p><b>This text is bold using b tag.</b></p>

    <p><strong>This text is important using strong tag.</strong></p>

    <p><i>This text is italic using i tag.</i></p>

    <p><em>This text is emphasized using em tag.</em></p>

</body>
</html>
